name: DAST Security Audit Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dast-scans:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'code files/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          cd "code files"
          npm ci

      - name: Run ESLint
        run: |
          cd "code files"
          npm run lint

      - name: Run Frontend Build
        run: |
          cd "code files"
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Install wait-on utility
        run: npm install -g wait-on

      - name: Start Vite Dev Server
        run: |
          cd "code files"
          npm run dev &
          wait-on http://localhost:5173 --timeout 30000

      - name: Run DAST Scans
        run: |
          python automated_test/dast_runner.py

      - name: Clean up processes
        if: always()
        run: |
          pkill -f "vite" || true
